<div class="masthead">
  <div class="masthead__inner-wrap">
    <div class="masthead__menu">
      <nav id="site-nav" class="greedy-nav">
        <a class="site-title" href="{‌{ '/' | relative_url }}">{‌{ site.title }}</a>
        <ul class="visible-links">
          <!-- modified to use multilevel nav, if you have existing _data/navigation.yml this will break -->
          {%- for link in site.data.navigation.main -%}
            {%- if link.url contains '://' -%}
              <li class="masthead__menu-item">
                <a href="{‌{ link.url }}" target="_blank" rel="noopener noreferrer">{‌{ link.title }}</a>
              </li>
            {%- else -%}
              <li class="masthead__menu-item">
                <a href="{‌{ link.url | relative_url }}">{‌{ link.title }}</a>
              </li>
            {%- endif -%}
          {%- endfor -%}
        </ul>
        {% if site.search == true %}
        <button class="search__toggle" type="button">
          <span class="visually-hidden">{‌{ site.data.ui-text[site.locale].search_label_text | default: 'Toggle search' }}</span>
          <i class="fas fa-search"></i>
        </button>
        {% endif %}
        <button class="greedy-nav__toggle hidden" type="button">
          <span class="visually-hidden">{‌{ site.data.ui-text[site.locale].menu_label | default: 'Toggle menu' }}</span>
          <div class="navicon"></div>
        </button>
        <ul class="hidden-links hidden"></ul>
      </nav>
    </div>
  </div>
</div>
