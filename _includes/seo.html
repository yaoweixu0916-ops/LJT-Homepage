{% include base_path %}

<meta name="description" content="{‌{ page.excerpt | default: site.description | strip_html | normalize_whitespace | truncate: 160 | escape }}">

{% if site.url %}
  <link rel="canonical" href="{‌{ page.url | absolute_url }}">
{% endif %}

<meta name="author" content="{‌{ site.author.name | default: site.title }}">

<meta property="og:type" content="article">
<meta property="og:title" content="{‌{ page.title | default: site.title | markdownify | strip_html | strip_newlines | escape_once }}">
<meta property="og:description" content="{‌{ page.excerpt | default: site.description | strip_html | normalize_whitespace | truncate: 160 | escape }}">
<meta property="og:url" content="{‌{ page.url | absolute_url }}">

<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="{‌{ page.title | default: site.title | markdownify | strip_html | strip_newlines | escape_once }}">
<meta name="twitter:description" content="{‌{ page.excerpt | default: site.description | strip_html | normalize_whitespace | truncate: 160 | escape }}">
<meta name="twitter:site" content="@{‌{ site.author.twitter }}">
<meta name="twitter:creator" content="@{‌{ site.author.twitter }}">
